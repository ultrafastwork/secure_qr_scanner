name: secure_qr_scanner
description: "Secure QR Code & Barcode Scanner"
publish_to: "none"

version: 0.3.3+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  path: ^1.9.1
  path_provider: ^2.1.6
  image_picker: ^1.2.3
  cupertino_icons: ^1.0.9
  flutter_svg: ^2.3.0
  package_info_plus: ^10.2.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  flutter_secure_storage: ^10.3.1
  flutter_riverpod: ^3.3.2
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  dio: ^5.10.0
  intl: ^0.20.3
  numeral: ^4.1.0
  pretty_qr_code: ^3.6.0
  google_fonts: ^8.1.0
  easy_loading_button: ^0.4.0
  date_format: ^2.0.9
  flutter_native_splash: ^2.4.7
  timeago: ^3.7.1
  photo_manager: ^3.10.0
  cached_network_image: ^3.4.1
  gal: ^2.3.2
  flex_color_picker: ^3.8.0

dependency_overrides:
  flutter_cache_manager:
    git:
      url: https://github.com/ultrafastwork/flutter_cache_manager
      ref: mapsteps
      path: flutter_cache_manager

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  hive_ce_generator: ^1.11.2

  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/

flutter_native_splash:
  # Background gradient images for pre-Android 12
  background_image: "assets/images/splash_bg_light.png"
  background_image_dark: "assets/images/splash_bg_dark.png"
  
  # Smaller logo image for pre-Android 12 (30% of original size)
  image: "assets/icons/logo_splash.png"
  image_dark: "assets/icons/logo_splash.png"
  
  android_gravity: center
  ios_content_mode: center
  
  fullscreen: false
  
  # Android 12+ specific configuration (REQUIRED for Android 12+)
  # Note: Android 12+ does NOT support background_image, only solid colors
  android_12:
    image: "assets/icons/logo_splash.png"
    # Light theme: average of gradient with 70% white overlay
    color: "#F0E7FE"  # lightened purple (gradient + white overlay)
    icon_background_color: "#F0E7FE"
    
    image_dark: "assets/icons/logo_splash.png"
    # Dark theme: gradient with 80% black overlay = very dark purple
    color_dark: "#19082E"  # darkened purple (gradient + 80% black overlay)
    icon_background_color_dark: "#19082E"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 24
